<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Video Downloader</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #fff; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; max-width: 450px; width: 90%; border: 1px solid #334155; }
        .logo-box { width: 70px; height: 70px; margin: 0 auto 15px; display: none; }
        .logo-box img { width: 100%; border-radius: 10px; }
        h2 { color: #38bdf8; font-size: 22px; margin-bottom: 20px; }
        .input-group { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; padding-right: 100px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; color: #fff; outline: none; box-sizing: border-box; }
        .action-btns { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); display: flex; gap: 5px; }
        .paste-btn, .clear-btn { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .paste-btn { background: #38bdf8; color: #0f172a; }
        .clear-btn { background: #ef4444; color: white; display: none; }
        .btn { background: linear-gradient(135deg, #38bdf8, #818cf8); color: white; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-bottom: 10px; }
        #resultArea { margin-top: 20px; display: none; background: #0f172a; padding: 15px; border-radius: 12px; border: 1px solid #334155; }
        .download-btn { background: #22c55e; color: white; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; display: block; text-decoration: none; margin-top: 10px; }
        #playerContainer { width: 100%; height: 250px; background: #000; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="card">
    <div id="logoContainer" class="logo-box"><img id="siteLogo" src="" alt="Logo"></div>
    <h2>🚀 ভিডিও ডাউনলোডার</h2>
    <div class="input-group">
        <input type="text" id="videoLink" placeholder="লিঙ্ক এখানে পেস্ট করুন..." oninput="checkInput()">
        <div class="action-btns">
            <button class="paste-btn" onclick="processPaste()">PASTE</button>
            <button id="clearBtn" class="clear-btn" onclick="processClear()">✖</button>
        </div>
    </div>
    <button class="btn" onclick="handleAction()">ভিডিও প্রসেস করুন</button>
    
    <div id="resultArea">
        <div id="playerContainer">প্রিভিউ লোড হচ্ছে...</div>
        <a id="finalDownload" href="#" class="download-btn" target="_blank">ডাউনলোড শুরু করুন</a>
    </div>
</div>

<script>
    function checkInput() {
        const link = document.getElementById('videoLink').value;
        const clearBtn = document.getElementById('clearBtn');
        const logoContainer = document.getElementById('logoContainer');
        const siteLogo = document.getElementById('siteLogo');

        if (link.trim().length > 0) {
            clearBtn.style.display = "block";
            let icon = "";
            if (link.includes("facebook")) icon = "https://cdn-icons-png.flaticon.com/512/124/124010.png";
            else if (link.includes("youtube") || link.includes("youtu.be")) icon = "https://cdn-icons-png.flaticon.com/512/1384/1384060.png";
            else if (link.includes("tiktok")) icon = "https://cdn-icons-png.flaticon.com/512/3046/3046121.png";
            else if (link.includes("instagram")) icon = "https://cdn-icons-png.flaticon.com/512/174/174855.png";
            else if (link.includes("twitter") || link.includes("x.com")) icon = "https://cdn-icons-png.flaticon.com/512/733/733579.png";

            if (icon) { siteLogo.src = icon; logoContainer.style.display = "block"; }
        } else {
            clearBtn.style.display = "none";
            logoContainer.style.display = "none";
        }
    }

    async function processPaste() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('videoLink').value = text;
            checkInput();
        } catch (err) { alert("হাত দিয়ে পেস্ট করুন।"); }
    }

    function processClear() {
        document.getElementById('videoLink').value = "";
        document.getElementById('resultArea').style.display = "none";
        checkInput();
    }

    async function handleAction() {
        const url = document.getElementById('videoLink').value;
        if (!url) return alert("লিঙ্ক দিন!");

        window.open("https://omg10.com/4/10527852", '_blank');
        
        const resultArea = document.getElementById('resultArea');
        const playerContainer = document.getElementById('playerContainer');
        const downloadBtn = document.getElementById('finalDownload');
        
        resultArea.style.display = "block";
        playerContainer.innerHTML = "প্রসেসিং হচ্ছে... একটু অপেক্ষা করুন।";

        try {
            // Cobalt API ব্যবহার করা হয়েছে যা সব প্ল্যাটফর্ম সাপোর্ট করে
            const response = await fetch("https://api.cobalt.tools/api/json", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Accept": "application/json" },
                body: JSON.stringify({ url: url, videoQuality: "720" })
            });
            const data = await response.json();

            if (data.url) {
                playerContainer.innerHTML = "ভিডিও তৈরি! নিচের বাটনে চাপ দিন।";
                downloadBtn.href = data.url;
                downloadBtn.style.display = "block";
            } else {
                playerContainer.innerHTML = "এই লিঙ্কটি কাজ করছে না। সঠিক লিঙ্ক দিন।";
                downloadBtn.style.display = "none";
            }
        } catch (error) {
            playerContainer.innerHTML = "সার্ভার এরর! দয়া করে আবার চেষ্টা করুন।";
        }
    }
</script>

</body>
</html>
