<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Downloader</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #fff; }
        .card { background: #1e293b; padding: 40px 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; max-width: 450px; width: 90%; border: 1px solid #334155; }
        .logo-box { width: 70px; height: 70px; margin: 0 auto 20px; display: none; }
        .logo-box img { width: 100%; }
        h2 { font-size: 24px; margin-bottom: 10px; color: #38bdf8; }
        .input-group { position: relative; margin: 25px 0; }
        input { width: 100%; padding: 15px; padding-right: 80px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; color: #fff; outline: none; box-sizing: border-box; }
        .paste-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #38bdf8; color: #0f172a; border: none; padding: 7px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn { background: #38bdf8; color: #0f172a; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #0ea5e9; }
        #status { margin-top: 20px; font-size: 14px; color: #94a3b8; }
        .download-link { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #22c55e; color: white; border-radius: 8px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div id="logoContainer" class="logo-box">
        <img id="siteLogo" src="" alt="Logo">
    </div>
    <h2>ভিডিও ডাউনলোডার</h2>
    <div class="input-group">
        <input type="text" id="videoLink" placeholder="ভিডিও লিঙ্ক এখানে দিন..." oninput="showLogo()">
        <button class="paste-btn" onclick="pasteLink()">PASTE</button>
    </div>
    <button class="btn" onclick="fetchVideo()">ডাউনলোড করুন</button>
    <div id="status"></div>
</div>

<script>
    async function pasteLink() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('videoLink').value = text;
            showLogo();
        } catch (err) { alert("Paste করার অনুমতি দিন!"); }
    }

    function showLogo() {
        const link = document.getElementById('videoLink').value.toLowerCase();
        const container = document.getElementById('logoContainer');
        const img = document.getElementById('siteLogo');
        let icon = "";
        if (link.includes("facebook")) icon = "https://cdn-icons-png.flaticon.com/512/124/124010.png";
        else if (link.includes("youtube") || link.includes("youtu.be")) icon = "https://cdn-icons-png.flaticon.com/512/1384/1384060.png";
        else if (link.includes("tiktok")) icon = "https://cdn-icons-png.flaticon.com/512/3046/3046121.png";
        else if (link.includes("instagram")) icon = "https://cdn-icons-png.flaticon.com/512/174/174855.png";

        if (icon) { img.src = icon; container.style.display = "block"; }
        else { container.style.display = "none"; }
    }

    async function fetchVideo() {
        const url = document.getElementById('videoLink').value;
        const status = document.getElementById('status');
        if (!url) return alert("লিঙ্ক দিন!");

        // ১. আপনার অ্যাড লিঙ্ক ওপেন হবে
        window.open("https://omg10.com/4/10527852", '_blank');

        status.innerHTML = "প্রসেসিং হচ্ছে... একটু অপেক্ষা করুন।";

        // ২. Cobalt API ব্যবহার করে সরাসরি ফাইল আনা
        try {
            const response = await fetch("https://api.cobalt.tools/api/json", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Accept": "application/json" },
                body: JSON.stringify({ url: url, videoQuality: "720" })
            });
            const data = await response.json();

            if (data.url) {
                status.innerHTML = `<a href="${data.url}" class="download-link" target="_blank">ফাইলটি ডাউনলোড করতে এখানে চাপুন</a>`;
            } else {
                status.innerText = "দুঃখিত, ভিডিওটি পাওয়া যায়নি। আবার চেষ্টা করুন।";
            }
        } catch (error) {
            status.innerText = "সার্ভার এরর! দয়া করে সঠিক লিঙ্ক দিন।";
        }
    }
</script>

</body>
</html>
