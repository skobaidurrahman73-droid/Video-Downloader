<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Video Downloader</title>
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #818cf8;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #fff;
            overflow: hidden;
        }

        /* ব্যাকগ্রাউন্ড অ্যানিমেশন */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            top: 10%;
            left: 10%;
            z-index: -1;
            opacity: 0.3;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 480px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-box {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: none;
            animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes scaleIn {
            from { transform: scale(0.5); }
            to { transform: scale(1); }
        }

        .logo-box img { width: 100%; filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.5)); }

        h2 { font-size: 28px; margin-bottom: 8px; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }

        .input-wrapper { position: relative; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 18px 20px;
            padding-right: 90px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #fff;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }

        .paste-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: #0f172a;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .paste-btn:hover { background: #fff; }

        .btn {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: #fff;
            padding: 18px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            font-size: 16px;
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
            transition: 0.3s;
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -5px rgba(56, 189, 248, 0.5); }

        #status { margin-top: 25px; min-height: 20px; }
        
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .download-link {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background: #22c55e;
            color: white;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            animation: bounce 2s infinite;
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body>

<div class="card">
    <div id="logoContainer" class="logo-box">
        <img id="siteLogo" src="" alt="Logo">
    </div>
    <h2>Social Downloader</h2>
    <p>Paste link and download in high quality</p>
    
    <div class="input-wrapper">
        <input type="text" id="videoLink" placeholder="ভিডিও লিঙ্কটি এখানে দিন..." oninput="showLogo()">
        <button class="paste-btn" onclick="pasteLink()">Paste</button>
    </div>
    
    <button class="btn" id="dlBtn" onclick="fetchVideo()">Download Now</button>
    
    <div id="status">
        <div id="loader" class="loader"></div>
        <div id="msg"></div>
    </div>
</div>

<script>
    async function pasteLink() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('videoLink').value = text;
            showLogo();
        } catch (err) { alert("Paste করার অনুমতি দিন!"); }
    }

    function showLogo() {
        const link = document.getElementById('videoLink').value.toLowerCase();
        const container = document.getElementById('logoContainer');
        const img = document.getElementById('siteLogo');
        let icon = "";
        if (link.includes("facebook")) icon = "https://cdn-icons-png.flaticon.com/512/124/124010.png";
        else if (link.includes("youtube") || link.includes("youtu.be")) icon = "https://cdn-icons-png.flaticon.com/512/1384/1384060.png";
        else if (link.includes("tiktok")) icon = "https://cdn-icons-png.flaticon.com/512/3046/3046121.png";
        else if (link.includes("instagram")) icon = "https://cdn-icons-png.flaticon.com/512/174/174855.png";

        if (icon) { img.src = icon; container.style.display = "block"; }
        else { container.style.display = "none"; }
    }

    async function fetchVideo() {
        const url = document.getElementById('videoLink').value;
        const msg = document.getElementById('msg');
        const loader = document.getElementById('loader');
        
        if (!url) return alert("দয়া করে একটি লিঙ্ক দিন!");

        window.open("https://omg10.com/4/10527852", '_blank');

        msg.innerHTML = "";
        loader.style.display = "block";

        try {
            const response = await fetch("https://api.cobalt.tools/api/json", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Accept": "application/json" },
                body: JSON.stringify({ url: url, videoQuality: "720" })
            });
            const data = await response.json();

            loader.style.display = "none";
            if (data.url) {
                msg.innerHTML = `<a href="${data.url}" class="download-link" target="_blank">Download Ready!</a>`;
            } else {
                msg.innerText = "ভিডিওটি পাওয়া যায়নি। আবার চেষ্টা করুন।";
            }
        } catch (error) {
            loader.style.display = "none";
            msg.innerText = "সার্ভার এরর! দয়া করে সঠিক লিঙ্ক দিন।";
        }
    }
</script>

</body>
</html>
